name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'Syncro_Red_Backend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            --silent \
            --show-error \
            -o /dev/null
          echo "Deploy triggered successfully"
