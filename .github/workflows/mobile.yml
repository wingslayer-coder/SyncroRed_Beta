name: Mobile CI + EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'Syncro_Red_Mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Syncro_Red_Mobile/**'
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  lint:
    name: TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Syncro_Red_Mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Syncro_Red_Mobile/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit || true

  build-android:
    name: EAS Build Android (APK)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: Syncro_Red_Mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Syncro_Red_Mobile/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: eas build --platform android --profile ${{ github.event.inputs.build_profile || 'preview' }} --non-interactive
