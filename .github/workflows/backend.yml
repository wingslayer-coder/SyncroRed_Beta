name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'Syncro_Red_Backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Syncro_Red_Backend/**'

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Syncro_Red_Backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: syncro_test
          POSTGRES_USER: syncro
          POSTGRES_PASSWORD: syncro_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-not-for-production-use
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      DB_NAME: syncro_test
      DB_USER: syncro
      DB_PASSWORD: syncro_test_pass
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Syncro_Red_Backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run system check
        run: python manage.py check

      - name: Run tests
        run: python -m pytest apps/usuarios/tests.py apps/operaciones/tests.py -v --tb=short

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Syncro_Red_Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
