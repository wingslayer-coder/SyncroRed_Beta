name: Smoke Test (post-deploy)

on:
  workflow_run:
    workflows: ["Deploy Backend"]
    types: [completed]
  workflow_dispatch:
    inputs:
      api_url:
        description: 'URL del backend a testear'
        required: false
        default: 'https://syncro-red-backend.onrender.com'

jobs:
  smoke:
    name: Health check
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Wait for service to warm up
        run: sleep 30

      - name: Health check
        run: |
          URL="${{ github.event.inputs.api_url || 'https://syncro-red-backend.onrender.com' }}"
          echo "Checking $URL/api/health/"
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" "$URL/api/health/")
          echo "HTTP Status: $RESPONSE"
          cat response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "Health check failed with status $RESPONSE"
            exit 1
          fi
          echo "Health check passed ✅"

      - name: Check DB connectivity
        run: |
          URL="${{ github.event.inputs.api_url || 'https://syncro-red-backend.onrender.com' }}"
          DB_STATUS=$(curl -s "$URL/api/health/" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['checks'].get('db','unknown'))")
          echo "DB status: $DB_STATUS"
          if [ "$DB_STATUS" != "ok" ]; then
            echo "DB check failed: $DB_STATUS"
            exit 1
          fi
